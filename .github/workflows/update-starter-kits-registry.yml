name: Update Starter Kits Registry

on:
  workflow_run:
    workflows: ["Update Registry"]
    types:
      - completed

concurrency:
  group: update-starter-kits-registry-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate starter-kit-registry.json
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run when the upstream Update Registry workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Generate starter-kit registry
        run: python .github/scripts/update_starter_kits_registry.py --repo-root .

      - name: Validate generated registry against starter-kit-registry-schema.json
        run: |
          python -c "
          import json, sys
          try:
              import jsonschema
              with open('docs/schemas/starter-kit-registry-schema.json') as f:
                  schema = json.load(f)
              with open('.auto-registry/starter-kit-registry.json') as f:
                  registry = json.load(f)
              jsonschema.Draft7Validator.check_schema(schema)
              validator = jsonschema.Draft7Validator(schema)
              errors = sorted(validator.iter_errors(registry), key=lambda e: list(e.absolute_path))
              if errors:
                  for err in errors:
                      path_str = ' -> '.join(str(p) for p in err.absolute_path) or '(root)'
                      print(f'  FAIL at {path_str}: {err.message}', file=sys.stderr)
                  sys.exit(1)
              print(f'  OK: starter-kit-registry.json validates against starter-kit-registry-schema.json ({len(registry.get(\"kits\", []))} kit(s)).')
          except FileNotFoundError as e:
              # No starter kits in the repo yet — generator skipped output.
              if '.auto-registry/starter-kit-registry.json' in str(e):
                  print('  SKIP: no starter-kit-registry.json produced (no kits in repo).')
              else:
                  raise
          except json.JSONDecodeError as e:
              print(f'  FAIL: starter-kit-registry.json is not valid JSON: {e}', file=sys.stderr)
              sys.exit(1)
          "

      # Mint a short-lived GitHub App installation token (discovery-registry-bot).
      # See update-registry.yml for the rationale.
      - name: Generate App installation token
        if: secrets.REGISTRY_APP_ID != ''
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.REGISTRY_APP_ID }}
          private-key: ${{ secrets.REGISTRY_APP_PRIVATE_KEY }}

      - name: Commit generated files via a PR
        env:
          # Use the App installation token for gh pr create / gh pr merge --auto
          # when available; fall back to GITHUB_TOKEN otherwise so the script
          # can still log a useful diagnostic instead of hard-failing.
          GH_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          HAS_APP_TOKEN: ${{ steps.app_token.outputs.token != '' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .auto-registry/starter-kit-registry.json
          if git diff --cached --quiet -- .auto-registry/starter-kit-registry.json; then
            echo "No changes to starter-kit registry."
            exit 0
          fi

          BRANCH="chore/starter-kit-registry-refresh"
          git fetch origin "$BRANCH" --depth=1 2>/dev/null || true
          git checkout -B "$BRANCH"

          COMMIT_MSG="chore: update .auto-registry/starter-kit-registry.json [skip ci]"
          git commit -m "$COMMIT_MSG"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" \
            "$BRANCH"

          if [ "$HAS_APP_TOKEN" != "true" ]; then
            echo "::warning::REGISTRY_APP_ID/REGISTRY_APP_PRIVATE_KEY secrets are not configured. Branch ${BRANCH} was force-pushed with the regenerated starter-kit registry, but no PR can be opened from GITHUB_TOKEN under this repo's policy. A maintainer must open the PR manually, or wire up the discovery-registry-bot GitHub App."
            exit 0
          fi

          if ! gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "$COMMIT_MSG" \
              --body "Automated starter-kit registry refresh. Generated by the *Update Starter Kits Registry* workflow."
          else
            echo "PR already exists for $BRANCH — force-push updated it in place."
          fi

          PR_NUMBER=$(gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" --json number --jq .number)
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --squash --delete-branch || \
            echo "::warning::Could not enable auto-merge on PR #$PR_NUMBER — a maintainer will need to merge it manually."