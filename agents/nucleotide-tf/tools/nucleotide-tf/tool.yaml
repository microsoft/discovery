name: nucleotide-tf
version: "1.0.0"
description: >
  DNA foundation model tool using InstaDeep's Nucleotide Transformer v2 (500M multi-species).
  Provides DNA sequence embedding extraction, masked nucleotide prediction, sequence similarity
  analysis, clustering, dimensionality reduction, and visualization. Pre-trained on 850 genomes
  (174B nucleotides) from diverse species. Supports FASTA input and batch processing.
category: Bioinformatics
infra:
  - name: worker
    infra_type: container
    image:
      acr: "{name}.azurecr.io/nucleotide-tf:latest"
    compute:
      min_resources:
        cpu: 3
        ram: "13Gi"
        gpu: 0
        storage: "0Gi"
      max_resources:
        cpu: 40
        ram: "320Gi"
        gpu: 1
        storage: "0Gi"
      infiniband: false
      recommended_sku:
        - Standard_NC40ads_H100_v5
        - Standard_D4s_v6
      pool_type: static
      pool_size: 1
code_environments:
  - language: python3
    command: 'python3 -u "/{{scriptName}}" > {{output_directory}}/logs.out 2>&1; cp -r /workdir/* {{output_directory}}/ 2>/dev/null || true; tail -n 100 {{output_directory}}/logs.out'
    description: >
      Python code environment with Nucleotide Transformer v2 (500M multi-species)
      for DNA sequence analysis. GPU recommended for inference on sequences > 1000nt.
      Key packages: transformers, torch, biopython, scikit-learn, numpy, scipy.
    infra_node: worker
