name: tamgen
description: >
  TamGen (Target-aware Molecule Generation) tool for structure-based drug design
  using a chemical language model. Generates novel drug-like molecules conditioned
  on protein binding pocket structures. Supports unconditional generation,
  scaffold-constrained generation, and batch candidate screening.
version: 1.0.0
category: "AI & Machine Learning"
license: MIT

infra:
  - name: worker
    infra_type: container
    image:
      acr: "{name}.azurecr.io/tamgen:latest"
    compute:
      min_resources:
        cpu: 4
        ram: "16Gi"
        gpu: 0
        storage: "0Gi"
      max_resources:
        cpu: 40
        ram: "320Gi"
        gpu: 1
        storage: "0Gi"
      recommended_sku:
        - Standard_NC40ads_H100_v5
      pool_type: static
      pool_size: 1

code_environments:
  - language: python3
    command: '/opt/conda/bin/python -u "/{{scriptName}}" > {{output_directory}}/logs.out 2>&1; cp -r /app/workdir/* {{output_directory}}/ 2>/dev/null || true; tail -n 100 {{output_directory}}/logs.out'
    description: |
      Python code environment with TamGen for target-aware molecule generation.
      Key features: pocket extraction from PDB, conditional molecule generation,
      scaffold-constrained design, molecular property analysis.
      Pre-installed: torch, torch_geometric, rdkit, fairseq, biopython, pandas, matplotlib
    infra_node: worker
