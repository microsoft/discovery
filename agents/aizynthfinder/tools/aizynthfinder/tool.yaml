name: aizynthFinder
description: >-
  Retrosynthetic route planning using AiZynthFinder with neural-network-guided
  Monte Carlo Tree Search (MCTS). Breaks down target molecules into purchasable
  precursors using USPTO reaction templates. Supports single-molecule and batch
  analysis, single-step expansion, route visualisation, and stock checking
  against ZINC. Pre-loaded with USPTO expansion/filter models and RingBreaker.
version: 1.0.0
category: Scientific Computing
license: MIT

infra:
  - name: worker
    infra_type: container
    image:
      acr: "{name}.azurecr.io/aizynthfinder:latest"
    compute:
      min_resources:
        cpu: 3
        ram: "13Gi"
        gpu: 0
        storage: "0Gi"
      max_resources:
        cpu: 32
        ram: "64Gi"
        gpu: 0
        storage: "0Gi"
      infiniband: false
      recommended_sku:
        - Standard_D4s_v6
        - Standard_D8s_v6
        - Standard_D16s_v6
        - Standard_D32s_v6
      pool_type: static
      pool_size: 1

code_environments:
  - language: python3
    command: >-
      python3 -u "/{{scriptName}}" > {{output_directory}}/logs.out 2>&1;
      cp -r /workdir/* {{output_directory}}/ 2>/dev/null || true;
      tail -n 100 {{output_directory}}/logs.out
    description: |
      Python code environment with AiZynthFinder for retrosynthetic route
      planning. Pre-loaded models: USPTO expansion + filter, RingBreaker,
      ZINC stock. Key packages: aizynthfinder, rdkit, onnxruntime, pandas,
      matplotlib, networkx.
    infra_node: worker
