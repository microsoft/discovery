name: alphafold
description: >
  Python code environment with ColabFold for AlphaFold2 protein structure prediction.
  GPU-accelerated inference with AMBER relaxation, MSA generation via MMseqs2,
  monomer and multimer support, confidence analysis (pLDDT, PAE, pTM).
version: 1.0.0
category: "Physics-Based Simulations"
license: "Apache-2.0"

infra:
  - name: worker
    infra_type: container
    image:
      acr: "{name}.azurecr.io/alphafold:latest"
    compute:
      min_resources:
        cpu: 4
        ram: "32Gi"
        gpu: 1
        storage: "0Gi"
      max_resources:
        cpu: 96
        ram: "320Gi"
        gpu: 1
        storage: "0Gi"
      infiniband: false
      recommended_sku:
        - Standard_NC40ads_H100_v5
      pool_type: static
      pool_size: 1

code_environments:
  - language: python3
    command: "python3 -u \"/{{scriptName}}\" > {{output_directory}}/logs.out 2>&1; cp -r /workdir/* {{output_directory}}/ 2>/dev/null || true; tail -n 100 {{output_directory}}/logs.out"
    description: |
      Python code environment with ColabFold for AlphaFold2 protein structure prediction.
      Supports single-chain and multimer predictions with AMBER relaxation.
      GPU required for inference. Includes MMseqs2 for MSA generation.
      Key commands: colabfold_batch, colabfold_search.
    infra_node: worker
