description: >
  Expert agent for retrosynthetic analysis using the RetroChimera model (Maziarz et al., 2025). Ensembles template-based
  and de novo models with complementary inductive biases to predict single-step retrosynthetic disconnections and
  multi-step synthesis routes. Pre-loaded with the Pistachio-trained checkpoint (strongest model).
