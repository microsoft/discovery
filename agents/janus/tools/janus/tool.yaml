name: janus
description: >
  De novo molecule generator using the JANUS parallel-tempered SELFIES-based genetic
  algorithm (Nigam et al., Digital Discovery 2022). Generates novel molecules guided by a
  user-supplied fitness function and an optional custom filter (e.g. PFAS rejection).
  SELFIES encoding guarantees 100% chemical validity of every generated structure.
  Supports parallel evaluation via multi-shard JANUS instances (controlled by
  `cpus_per_shard`). Scaling is bounded by the number of unique seed molecules:
  shards is capped at `len(seeds)`, so utilising 48-192 vCPUs requires supplying
  a correspondingly diverse seed set.
version: 1.0.0
category: "Generative Molecular Design"
license: MIT

infra:
  - name: worker
    infra_type: container
    image:
      acr: "{name}.azurecr.io/janus:latest"
    compute:
      min_resources:
        cpu: 3
        ram: 8Gi
        storage: 16Gi
        gpu: 0
      max_resources:
        cpu: 96
        ram: 384Gi
        storage: 32Gi
        gpu: 0
      recommended_sku:
        - Standard_D4s_v6
        - Standard_D8s_v6
        - Standard_D16s_v6
        - Standard_D32s_v6
        - Standard_D48s_v6
        - Standard_D96s_v6
      pool_type: static
      pool_size: 1

code_environments:
  - language: python3
    command: 'python3 -u "/{{scriptName}}" > {{output_directory}}/logs.out 2>&1; cp -r /workdir/* {{output_directory}}/ 2>/dev/null || true; tail -n 100 {{output_directory}}/logs.out'
    description: |
      Python code environment with JANUS (janus-ga) for de novo molecule generation.
      Pre-installed: janus-ga 1.0.3, selfies 1.0.3 (pinned by janus-ga), rdkit, torch (CPU),
      numpy, pandas, pyyaml, matplotlib. Helper module: janus_utils.
      No GPU. No model weights bundled. No internet at runtime.
      Multi-shard scaling on 8 -> 48 -> 96 -> 192 vCPUs is bounded by the
      number of unique seed SMILES (one shard per seed). Provide a diverse
      seed set to keep large SKUs fully utilised.
    infra_node: worker
