name: iverilog-tool
description: "Tools for generating and syntax-checking Verilog code using Icarus Verilog (iverilog/vvp). Input data is delivered via inputMounts (mounted at /mnt/input). Outputs are written to /mnt/output."
version: "1.0.0"
license: GPL-2.0
category: "Discovery tools"

infra:
  - name: worker
    infra_type: container
    image:
      acr: "{name}/siphys2r.5-iverilog:latest"
    compute:
      pool_type: static
      pool_size: 1
      recommended_sku:
        - Standard_E4as_v6
      min_resources:
        cpu: 2
        ram: "8Gi"
        storage: "110Gi"
        gpu: 0
      max_resources:
        cpu: 4
        ram: "16Gi"
        storage: "440Gi"
        gpu: 0

actions:
  - name: iverilog_version
    description: "Display Icarus Verilog (iverilog) and runtime (vvp) version information."
    infra_node: worker
    command: "bash -c 'echo \"=== iverilog -V ===\"\niverilog -V\necho\necho \"=== vvp -V ===\"\nvvp -V\n'"
    input_schema:
      type: object
      properties: {}
      required: []

  - name: iverilog_help
    description: "Display Icarus Verilog (iverilog) and runtime (vvp) usage/help information."
    infra_node: worker
    command: "bash -c 'echo \"=== iverilog -h ===\"\niverilog -h 2>&1 || true\necho\necho \"=== vvp -h ===\"\nvvp -h 2>&1 || true\n'"
    input_schema:
      type: object
      properties: {}
      required: []

  - name: iverilog_syntax_check
    description: "Perform a syntax check on a single Verilog source file. The input data is mounted via inputMounts at /mnt/input."
    infra_node: worker
    command: "bash -c 'INPUT=\"/mnt/input\"\nFILE_PATH=\"${INPUT}/{{file}}\"\nif [ -d \"${INPUT}\" ] && [ -f \"${FILE_PATH}\" ]; then\n  TARGET=\"${FILE_PATH}\"\nelif [ -f \"${INPUT}\" ]; then\n  TARGET=\"${INPUT}\"\nelse\n  echo \"Error: file not found at ${FILE_PATH} or ${INPUT}\"\n  ls -la /mnt/ 2>&1\n  exit 2\nfi\niverilog -Wall -t null -o /dev/null \"${TARGET}\" 2>&1 && echo \"No syntax errors\"\n'"
    input_schema:
      type: object
      properties:
        file:
          type: string
          description: "File name of the Verilog source file (relative to the mounted input directory)."
      required:
        - file


